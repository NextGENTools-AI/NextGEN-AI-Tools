<!doctype html>
<html lang="en">

    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NextGEN AI Tools",
      "url": "https://nextgenai.tools",
      "potentialAction": {
        "@type": "SearchAction",
